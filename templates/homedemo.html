<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurants | HappyTummy</title>
    <!-- Import FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../static/css/styles.css">
</head>

<body>

    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <a href="landing.html" class="nav-brand">
            <span class="brand-bold">Happy</span><span class="brand-colored">Tummy</span>
        </a>
        <div class="nav-items">
            <a href="landing.html" class="nav-link"><i class="fa-solid fa-house"></i> <span>Home</span></a>
            <a href="homedemo.html" class="nav-link active"><i class="fa-solid fa-utensils"></i>
                <span>Restaurants</span></a>
            <a href="cart.html" class="nav-link"><i class="fa-solid fa-cart-shopping"></i> <span>Cart</span></a>
            <a href="auth.html" class="nav-link"><i class="fa-solid fa-user"></i> <span>Account</span></a>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <header class="hero">
        <h1>HappyTummy Offers You</h1>
        <h2>The Best Tasting Experience!</h2>
    </header>

    <!-- SEARCH BOX -->
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="restaurantSearch" placeholder="Search for your favorite restaurants...">
            <button><i class="fa-solid fa-magnifying-glass"></i> Search</button>
        </div>
    </div>

    <!-- RESTAURANT LIST -->
    <h2 class="section-title">Explore Our Top Listed Partners</h2>

    <div class="container">

        {% for restaurant in restaurants %}
        <a href="/menu/{{ restaurant.restaurantId }}" class="card">
            <img src="{{ restaurant.imageurl }}" alt="{{ restaurant.restaurantName }}">
            <div class="card-info">
                <h2>{{ restaurant.restaurantName }}</h2>
                <div class="rating">★★★★★</div>
                <div class="tags">
                    <span>{{ restaurant.location }}</span>
                </div>
                <p><i class="fa-solid fa-phone"></i> {{ restaurant.phone }}</p>
                <p style="margin-top:5px; font-weight:600; color:#FFAA00;">View Full Menu &rarr;</p>
            </div>
        </a>
        {% endfor %}

    </div>

    <!-- External Filtering script -->
    <script src="../static/js/homedemo.js"></script>
</body>

</html>
